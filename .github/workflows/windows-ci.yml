name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run test suite
        shell: pwsh
        run: |
          python -m pytest

      - name: Run browser golden corpus validation
        shell: pwsh
        run: |
          python -m msg_to_pdf_dropzone.browser_validation --cases-dir .\emails-for-testing --output-root .\.local-browser-run --timeout-seconds 900

      - name: Upload browser validation artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-validation-artifacts
          path: .local-browser-run
          if-no-files-found: ignore
          retention-days: 14
