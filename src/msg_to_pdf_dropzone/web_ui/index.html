<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSG to PDF Dropzone</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%231f446d'/%3E%3Cpath d='M16 34L22 13h6l4 12 4-8h5l-7 17h-6l-3-9-3 9z' fill='%23f5efe0'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/app.css?v=queue-progress-bars-6">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local conversion workstation</p>
          <h1>MSG to PDF Dropzone</h1>
        </div>
        <div class="topbar-badge" id="queue-count-badge">0 queued</div>
      </header>

      <main class="app">
        <section class="main-column">
          <section class="workflow-panel">
            <div class="workflow-header">
              <div class="workflow-copy">
                <p class="section-label">Intake</p>
                <h2>Drop emails or <code>.msg</code> files.</h2>
                <p class="hero-body">
                  Drag from classic Outlook, new Outlook, Outlook on the web, or File Explorer. Everything stays local.
                </p>
              </div>

              <button class="button button-primary button-large workflow-button" id="convert-button" type="button">Convert to PDF</button>
            </div>

            <label class="dropzone dropzone-intake" id="dropzone" for="file-input">
              <input id="file-input" type="file" accept=".msg" multiple hidden>
              <span class="dropzone-label">Drop emails here</span>
              <span class="dropzone-copy">Supports Outlook drags and <code>.msg</code> files. Click to browse manually if needed.</span>
            </label>
          </section>

          <section class="queue-panel">
            <div class="panel-header">
              <div>
                <p class="section-label">Queued batch</p>
                <h2>Queue</h2>
              </div>
              <button class="button button-secondary" id="clear-button" type="button">Clear Queue</button>
            </div>

            <div class="queue-empty" id="queue-empty">
              Add Outlook messages to start.
            </div>

            <div class="queue-list" id="queue-list" hidden></div>
          </section>
        </section>

        <section class="side-column">
          <section class="status-panel">
            <div class="panel-header">
              <div>
                <p class="section-label">System log</p>
                <h2>Activity</h2>
              </div>
              <div class="connection-status">
                <span class="status-dot" id="connection-dot"></span>
                <span id="connection-status">Connecting...</span>
              </div>
            </div>
            <div class="status-log" id="status-log" aria-live="polite"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/static/app.js?v=queue-progress-bars-6"></script>
  </body>
</html>
